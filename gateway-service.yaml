server:
 port: 8080

spring:
 application:
   name: gateway-service
 cloud:
   gateway:
     server:
       webmvc:
         routes:
           - id: auth-service
             uri: lb://auth-service
             predicates:
               - Path=/auth-service/**
             filters:
               - StripPrefix=1
eureka:
 client:
   register-with-eureka: true
   fetch-registry: true
   service-url:
     defaultZone: http://localhost:8761/eureka
 instance:
   prefer-ip-address: true